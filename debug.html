<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Inspeção — ISIS CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --text: #f1f5f9; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 40px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border); }
        .stat-card h3 { color: var(--accent); margin: 0; font-size: 14px; text-transform: uppercase; }
        .stat-card p { font-size: 32px; font-weight: 700; margin: 10px 0 0 0; }
        
        section { background: var(--card); border-radius: 15px; border: 1px solid var(--border); margin-bottom: 30px; overflow: hidden; }
        .section-header { padding: 20px; background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--border); font-weight: 700; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 15px; background: rgba(0,0,0,0.2); color: var(--accent); }
        td { padding: 15px; border-bottom: 1px solid var(--border); }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; }
        .pro { background: #8b5cf6; color: white; }
        .free { background: #64748b; color: white; }
        .active { color: #10b981; }
        .status-novo { color: #60a5fa; }
        .status-convertido { color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Central de Dados do Sistema</h1>
        
        <div class="stats">
            <div class="stat-card"><h3>Empresas</h3><p id="t-comp">0</p></div>
            <div class="stat-card"><h3>Leads Totais</h3><p id="t-leads">0</p></div>
            <div class="stat-card"><h3>Mensagens</h3><p id="t-msg">0</p></div>
        </div>

        <section>
            <div class="section-header">🏢 Empresas Cadastradas</div>
            <table>
                <thead><tr><th>ID</th><th>Nome</th><th>Email</th><th>Plano</th><th>Status</th></tr></thead>
                <tbody id="b-comp"></tbody>
            </table>
        </section>

        <section>
            <div class="section-header">👥 Leads do Sistema (Geral)</div>
            <table>
                <thead><tr><th>ID</th><th>Empresa ID</th><th>Nome</th><th>WhatsApp</th><th>Status</th><th>Interesse</th></tr></thead>
                <tbody id="b-leads"></tbody>
            </table>
        </section>
    </div>

    <script>
        const API = 'https://crm-api-isisaiagent.vercel.app/api/debug';

        async function init() {
            try {
                const res = await fetch(API);
                const data = await res.json();

                document.getElementById('t-comp').textContent = data.total_empresas;
                document.getElementById('t-leads').textContent = data.total_leads;
                document.getElementById('t-msg').textContent = data.total_mensagens;

                // Render Empresas
                document.getElementById('b-comp').innerHTML = data.empresas.map(e => `
                    <tr>
                        <td>${e.id}</td>
                        <td style="font-weight:bold">${e.name}</td>
                        <td>${e.email}</td>
                        <td><span class="badge ${e.plan}">${e.plan}</span></td>
                        <td class="${e.active ? 'active' : ''}">${e.active ? '● Ativo' : 'Inativo'}</td>
                    </tr>
                `).join('');

                // Render Leads
                document.getElementById('b-leads').innerHTML = data.leads.map(l => `
                    <tr>
                        <td>${l.id}</td>
                        <td>#${l.company_id}</td>
                        <td>${l.name}</td>
                        <td>${l.whatsapp}</td>
                        <td><span class="status-${l.status}">${l.status}</span></td>
                        <td style="opacity:0.7">${l.interesse || '-'}</td>
                    </tr>
                `).join('');

            } catch (err) {
                alert("Erro ao carregar dados do banco.");
            }
        }
        init();
    </script>
</body>
</html>
