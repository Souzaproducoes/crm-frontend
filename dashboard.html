<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISIS AI Agent - Dashboard Premium</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="premium-theme">
    <div class="app-shell">
        <!-- Sidebar Fixa -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="brand-icon">⚡</span>
                <span class="brand-name">ISIS AI Agent</span>
            </div>

            <div class="user-context">
                <div class="user-avatar">SP</div>
                <div class="user-info">
                    <p id="companyName" class="company-title">Carregando...</p>
                    <span id="companyPlan" class="plan-badge">FREE</span>
                </div>
            </div>

            <nav class="side-nav">
                <a href="#" class="nav-btn active"><span>📊</span> Dashboard</a>
                <a href="#" class="nav-btn"><span>👥</span> Leads</a>
                <a href="#" class="nav-btn"><span>📈</span> Pipeline</a>
                <a href="#" class="nav-btn"><span>⚙️</span> Configurações</a>
            </nav>

            <div class="sidebar-footer">
                <button onclick="logout()" class="logout-link"><span>🚪</span> Sair do Sistema</button>
            </div>
        </aside>

        <!-- Área de Conteúdo que ocupa o resto da tela -->
        <main class="main-viewport">
            <header class="content-header">
                <div class="header-titles">
                    <h1>Painel de Controle</h1>
                    <p id="lastUpdateTime">Atualizado agora</p>
                </div>
                <div class="header-actions">
                    <button class="refresh-circle" onclick="loadLeads()" title="Atualizar dados">🔄</button>
                </div>
            </header>

            <!-- Cards Superiores -->
            <section class="metrics-grid">
                <div class="m-card">
                    <p>Total Leads</p>
                    <h2 id="statTotal">0</h2>
                </div>
                <div class="m-card">
                    <p>Novos</p>
                    <h2 id="statNovos" class="stat-blue">0</h2>
                </div>
                <div class="m-card">
                    <p>Em Atendimento</p>
                    <h2 id="statAtendimento" class="stat-yellow">0</h2>
                </div>
                <div class="m-card">
                    <p>Convertidos</p>
                    <h2 id="statConvertidos" class="stat-green">0</h2>
                </div>
            </section>

            <!-- Grid de Trabalho (Split View) -->
            <section class="work-area">
                <!-- Coluna da Esquerda: Lista -->
                <div class="list-container">
                    <div class="container-head">
                        <h3>Lista de Contatos</h3>
                        <div class="tab-filters">
                            <button class="filter-btn active" data-filter="all">Todos (<span id="countAll">0</span>)</button>
                        </div>
                    </div>
                    <div id="leadsList" class="scrollable-list">
                        <!-- Leads aqui -->
                    </div>
                </div>

                <!-- Coluna da Direita: Detalhes -->
                <div id="detailPanel" class="details-container">
                    <div class="empty-view">
                        <div class="empty-icon">📂</div>
                        <p>Selecione um lead para gerenciar</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="toastContainer" class="toast-stack"></div>
    <script src="dashboard.js"></script>
</body>
</html>
