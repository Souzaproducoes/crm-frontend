<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISIS AI Agent - Premium CRM</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">⚡ ISIS AI AGENT</div>
            
            <div class="company-info" style="margin-bottom: 30px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px;">
                <p id="companyName" style="font-weight: 600;"></p>
                <span id="companyPlan" class="badge" style="font-size: 10px; background: var(--primary); padding: 2px 8px; border-radius: 5px;"></span>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-link active">📊 Dashboard</a>
                <a href="#" class="nav-link">👥 Leads</a>
                <a href="#" class="nav-link">📈 Pipeline</a>
                <a href="#" class="nav-link">⚙️ Configurações</a>
            </nav>

            <footer class="sidebar-footer">
                <button onclick="logout()" class="logout-btn" style="width: 100%; padding: 12px; background: #ef444422; color: #ef4444; border: 1px solid #ef444444; border-radius: 10px; cursor: pointer;">Sair</button>
            </footer>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <header class="dashboard-header">
                <div>
                    <h1>Bem-vindo ao Painel</h1>
                    <p id="lastUpdateTime" style="color: var(--text-dim); font-size: 13px;">Atualizado agora</p>
                </div>
                <button class="btn-refresh" onclick="loadLeads()" style="background: var(--bg-card); border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer;">🔄 Atualizar</button>
            </header>

            <!-- Stats -->
            <section class="stats-grid">
                <div class="stat-card">
                    <p class="stat-label">Total Leads</p>
                    <h2 id="statTotal" class="stat-value">0</h2>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Novos</p>
                    <h2 id="statNovos" class="stat-value">0</h2>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Em Atendimento</p>
                    <h2 id="statAtendimento" class="stat-value">0</h2>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Convertidos</p>
                    <h2 id="statConvertidos" class="stat-value">0</h2>
                </div>
            </section>

            <!-- Grid de Conteúdo -->
            <section class="content-grid">
                <div class="panel">
                    <div class="panel-header">
                        <h3>Lista de Leads</h3>
                        <span id="countAll" style="font-size: 12px; opacity: 0.6;">0</span>
                    </div>
                    <div id="leadsList" class="leads-list">
                        <!-- Gerado via JS -->
                    </div>
                </div>

                <div class="panel" id="detailPanel">
                    <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-dim);">
                        Selecione um lead para ver os detalhes
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <div id="toastContainer"></div>
    <script src="dashboard.js"></script>
</body>
</html>
