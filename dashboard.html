<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Isis Ai Agent — Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="premium-theme">
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">⚡ Isis Ai Agent</div>
            <div class="user-context">
                <div class="user-avatar">AI</div>
                <div class="user-info">
                    <p id="companyName" class="company-title">...</p>
                    <span id="companyPlan" class="plan-badge">FREE</span>
                </div>
            </div>
            <nav class="side-nav">
                <a href="#" class="nav-btn active">📊 Dashboard</a>
                <a href="#" class="nav-btn">👥 Leads</a>
                <button onclick="exportarDados()" class="nav-btn" style="color:#10b981; background:none; border:none; width:100%; cursor:pointer;">📥 Exportar Backup</button>
            </nav>
            <div class="sidebar-footer">
                <button onclick="logout()" class="logout-link">🚪 Sair</button>
            </div>
        </aside>

        <main class="main-viewport">
            <header class="content-header">
                <h1>Painel de Controle</h1>
                <button class="refresh-circle" onclick="loadLeads()">🔄</button>
            </header>

            <section class="metrics-grid">
                <div class="m-card"><p>Total</p><h2 id="statTotal">0</h2></div>
                <div class="m-card"><p>Novos</p><h2 id="statNovos" style="color:#60a5fa">0</h2></div>
                <div class="m-card"><p>Atendimento</p><h2 id="statAtendimento" style="color:#fbbf24">0</h2></div>
                <div class="m-card"><p>Convertidos</p><h2 id="statConvertidos" style="color:#34d399">0</h2></div>
            </section>

            <section class="work-area">
                <div class="list-container">
                    <div class="container-head"><h3>Contatos (<span id="countAll">0</span>)</h3></div>
                    <div id="leadsList" class="scrollable-list"></div>
                </div>
                <div id="detailPanel" class="details-container">
                    <div class="empty-view"><p>Selecione um lead</p></div>
                </div>
            </section>
        </main>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
