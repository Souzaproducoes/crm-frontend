<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISIS AI Agent - Login</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <span class="login-logo">⚡</span>
            <h1>ISIS CRM</h1>
            <p>Seja bem-vindo de volta</p>
        </div>

        <div class="tab-switcher">
            <button id="tab-login" class="active">Entrar</button>
            <button id="tab-register">Registrar</button>
        </div>

        <form id="authForm">
            <div id="registerOnlyFields" style="display:none;">
                <input type="text" id="companyName" placeholder="Nome da Empresa">
            </div>
            <input type="email" id="email" placeholder="E-mail profissional" required>
            <input type="password" id="password" placeholder="Sua senha" required>
            <button type="submit" id="submitBtn">Entrar no Painel</button>
        </form>
        
        <p id="msg" class="msg-box"></p>
    </div>
    <script src="index.js"></script>
</body>
</html>
