<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISIS AI Agent CRM - Login</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="auth-container">
        <!-- Logo e Header -->
        <div class="auth-header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <h1>ISIS AI Agent CRM</h1>
            </div>
            <p class="subtitle">Automatize suas vendas com inteligência artificial</p>
        </div>

        <!-- Tabs Login/Registro -->
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Entrar</button>
            <button class="tab-btn" data-tab="register">Criar Conta</button>
        </div>

        <!-- Formulário de Login -->
        <form id="loginForm" class="auth-form active">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input 
                    type="email" 
                    id="loginEmail" 
                    placeholder="seu@email.com" 
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="loginPassword">Senha</label>
                <input 
                    type="password" 
                    id="loginPassword" 
                    placeholder="••••••••" 
                    required
                    autocomplete="current-password"
                >
            </div>

            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMe">
                    <span>Lembrar de mim</span>
                </label>
            </div>

            <button type="submit" class="btn-primary" id="loginBtn">
                <span class="btn-text">Entrar</span>
                <span class="btn-loading hidden">
                    <span class="spinner"></span>
                    Entrando...
                </span>
            </button>

            <div id="loginError" class="error-message hidden"></div>
        </form>

        <!-- Formulário de Registro -->
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="registerCompany">Nome da Empresa *</label>
                <input 
                    type="text" 
                    id="registerCompany" 
                    placeholder="Ex: Minha Empresa Ltda" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="registerEmail">Email Profissional *</label>
                <input 
                    type="email" 
                    id="registerEmail" 
                    placeholder="seu@email.com" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="registerPhone">Telefone/WhatsApp</label>
                <input 
                    type="tel" 
                    id="registerPhone" 
                    placeholder="(11) 99999-9999"
                >
            </div>

            <div class="form-group">
                <label for="registerIndustry">Tipo de Negócio</label>
                <select id="registerIndustry">
                    <option value="">Selecione...</option>
                    <option value="varejo">Varejo / E-commerce</option>
                    <option value="imobiliario">Imobiliária</option>
                    <option value="saude">Saúde / Clínica</option>
                    <option value="educacao">Educação / Escola</option>
                    <option value="alimentacao">Restaurante / Alimentação</option>
                    <option value="servicos">Prestação de Serviços</option>
                    <option value="tecnologia">Tecnologia / Software</option>
                    <option value="outro">Outro</option>
                </select>
            </div>

            <div class="form-group">
                <label for="registerPassword">Senha *</label>
                <input 
                    type="password" 
                    id="registerPassword" 
                    placeholder="Mínimo 6 caracteres" 
                    required
                    minlength="6"
                >
            </div>

            <div class="form-group">
                <label for="registerConfirm">Confirmar Senha *</label>
                <input 
                    type="password" 
                    id="registerConfirm" 
                    placeholder="Repita a senha" 
                    required
                >
            </div>

            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" id="acceptTerms" required>
                    <span>Aceito os Termos de Uso</span>
                </label>
            </div>

            <button type="submit" class="btn-primary" id="registerBtn">
                <span class="btn-text">Criar Conta Grátis</span>
                <span class="btn-loading hidden">
                    <span class="spinner"></span>
                    Criando...
                </span>
            </button>

            <div id="registerError" class="error-message hidden"></div>
            <div id="registerSuccess" class="success-message hidden"></div>

            <div class="trial-info">
                <span class="trial-badge">🎁 14 dias grátis</span>
                <p>Sem cartão de crédito necessário</p>
            </div>
        </form>

        <!-- Footer com Assinatura -->
        <div class="auth-footer">
            <p class="footer-text">© 2026 ISIS AI Agent CRM. Todos os direitos reservados.</p>
            <div class="footer-signature">
                <span class="footer-label">Desenvolvido por </span>
                <a href="https://wa.me/5562991444852" target="_blank" class="signature-link" title="Falar no WhatsApp">
                    <span class="signature-icon">💼</span>
                    <span class="signature-text">Souza Produções</span>
                    <span class="signature-badge">WhatsApp</span>
                </a>
            </div>
            <div class="system-status">
                <span class="status-dot"></span>
                <span>Sistema online</span>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
